name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy-backend:
    name: Deploy Backend Serverless
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          version: '1.93.0'

      - name: SAM Build & Deploy
        working-directory: ./backend
        run: |
          sam build
          sam package --s3-bucket hzcode-mx-cfn-artifacts-870819815698 --output-template-file packaged.yaml
          sam deploy --template-file packaged.yaml --stack-name hzcode-backend --capabilities CAPABILITY_IAM --no-fail-on-empty-changeset --parameter-overrides SmtpPassword=${{ secrets.IONOS_SMTP_PASS }} RecaptchaSecretKey=${{ secrets.RECAPTCHA_SECRET_KEY }}

  deploy-frontend:
    name: Deploy Frontend React
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync frontend/out s3://hzcode-mx-frontend-870819815698 --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E1P8QPVFRFKGXD --paths "/*"

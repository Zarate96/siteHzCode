AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  hzcode.mx backend
  SAM Template for the serverless migration of the django application.

Parameters:
  SmtpPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: IONOS SMTP password for sending emails

Globals:
  Function:
    Timeout: 3
    Runtime: python3.11
    Architectures:
      - x86_64
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS,PUT,DELETE'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"

Resources:
  # ----------------------------------------------------------------------
  # DYNAMODB TABLES
  # ----------------------------------------------------------------------
  HzCodeBlogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hzcode-blog
      AttributeDefinitions:
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: slug
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HzCodeExperienceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hzcode-experience
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HzCodeMessagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hzcode-messages
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HzCodeQuotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hzcode-quotes
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HzCodeAdminTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hzcode-admin
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HzCodePortfolioTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hzcode-portfolio
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HzCodeAboutTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hzcode-about
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HzCodeMediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: hzcode-mx-media-870819815698
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  HzCodeMediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref HzCodeMediaBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::hzcode-mx-media-870819815698/*'

  # ----------------------------------------------------------------------
  # LAMBDA FUNCTIONS
  # ----------------------------------------------------------------------
  BlogFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/blog/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HzCodeBlogTable
      Environment:
        Variables:
          ADMIN_SECRET: "admin123" # Deprecated, keeping for backwards compat if needed.
          JWT_SECRET: "my-super-secret-jwt-key" # In production, set via AWS SecretsManager
      Events:
        GetBlogList:
          Type: Api
          Properties:
            Path: /api/blog
            Method: get
        GetBlogDetail:
          Type: Api
          Properties:
            Path: /api/blog/{slug}
            Method: get
        CreateBlog:
          Type: Api
          Properties:
            Path: /api/blog
            Method: post
        DeleteBlog:
          Type: Api
          Properties:
            Path: /api/blog/{slug}
            Method: delete

  ContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/contact/
      Handler: app.lambda_handler
      Timeout: 15
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HzCodeMessagesTable
      Environment:
        Variables:
          JWT_SECRET: "my-super-secret-jwt-key"
          SMTP_USER: "hugo.zarate@hzcode.mx"
          SMTP_PASS: !Ref SmtpPassword
      Events:
        PostContactMsg:
          Type: Api
          Properties:
            Path: /api/contact
            Method: post
        GetMessages:
          Type: Api
          Properties:
            Path: /api/contact
            Method: get
        UpdateMessage:
          Type: Api
          Properties:
            Path: /api/contact/{id}
            Method: put

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/auth/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HzCodeAdminTable
      Environment:
        Variables:
          JWT_SECRET: "my-super-secret-jwt-key" # Keep this identical to BlogFunction
          TABLE_NAME: "hzcode-admin"
      Events:
        Login:
          Type: Api
          Properties:
            Path: /api/auth/login
            Method: post

  PortfolioFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/portfolio/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HzCodePortfolioTable
      Environment:
        Variables:
          JWT_SECRET: "my-super-secret-jwt-key"
          TABLE_NAME: "hzcode-portfolio"
      Events:
        GetPortfolio:
          Type: Api
          Properties:
            Path: /api/portfolio
            Method: get
        CreateProject:
          Type: Api
          Properties:
            Path: /api/portfolio
            Method: post
        DeleteProject:
          Type: Api
          Properties:
            Path: /api/portfolio/{id}
            Method: delete

  AboutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/about/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HzCodeAboutTable
      Environment:
        Variables:
          JWT_SECRET: "my-super-secret-jwt-key"
          TABLE_NAME: "hzcode-about"
      Events:
        GetAbout:
          Type: Api
          Properties:
            Path: /api/about
            Method: get
        UpdateAbout:
          Type: Api
          Properties:
            Path: /api/about
            Method: put

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/upload/
      Handler: app.lambda_handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref HzCodeMediaBucket
      Environment:
        Variables:
          JWT_SECRET: "my-super-secret-jwt-key"
          MEDIA_BUCKET: "hzcode-mx-media-870819815698"
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            Path: /api/upload
            Method: post

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
